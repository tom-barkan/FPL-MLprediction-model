# FPL Prediction Eval Suite
# Defines named test scenarios grouped by category.
# Each case filters the test set (GW31+) and checks model behaviour.

categories:
  fixture_context:
    description: "Does the model understand fixture difficulty?"
    cases:
      - name: premium_mid_home_easy
        description: "Top midfielder at home vs bottom-half team"
        criteria: "Should predict 6+ points"
        filter:
          position: MID
          price_min: 10.0
          was_home: 1
          fixture_difficulty_max: 2
        expected_range: [5, 15]

      - name: premium_mid_away_hard
        description: "Top midfielder away vs top-6 team"
        criteria: "Should predict lower than home easy equivalent"
        filter:
          position: MID
          price_min: 10.0
          was_home: 0
          fixture_difficulty_min: 4
        expected_range: [2, 8]

      - name: home_vs_away_all
        description: "All home players vs all away players"
        criteria: "Home predictions should average higher than away"
        filter:
          was_home: 1
        expected_range: [1, 15]

  positional:
    description: "Does the model handle different positions correctly?"
    cases:
      - name: goalkeeper_home
        description: "GK at home — clean sheet opportunity"
        filter:
          position: GK
          was_home: 1
        expected_range: [2, 8]

      - name: budget_defender_away
        description: "Cheap defender away from home"
        filter:
          position: DEF
          price_max: 4.8
          was_home: 0
        expected_range: [1, 5]

      - name: premium_forward_form
        description: "Expensive striker in good form"
        filter:
          position: FWD
          price_min: 8.0
          form_3gw_min: 4.0
        expected_range: [3, 12]

      - name: midfielder_high_ict
        description: "Midfielder with high ICT index"
        filter:
          position: MID
          ict_index_3gw_min: 25.0
        expected_range: [3, 15]

  edge_cases:
    description: "How does the model handle unusual situations?"
    cases:
      - name: player_low_minutes
        description: "Player averaging <60 mins — rotation risk"
        criteria: "Should predict lower to account for sub/bench risk"
        filter:
          avg_minutes_3gw_max: 60
        expected_range: [0, 4]

      - name: player_on_hot_streak
        description: "Player with 7+ form — on a hot streak"
        criteria: "Should predict high but not extrapolate blindly"
        filter:
          form_3gw_min: 7.0
        expected_range: [4, 15]

      - name: struggling_team
        description: "Player from a team conceding heavily"
        criteria: "Less likely to keep clean sheets or get bonus"
        filter:
          team_goals_conceded_3gw_min: 6
        expected_range: [0, 6]

      - name: cold_player
        description: "Player with very low recent form"
        criteria: "Should predict low points"
        filter:
          form_3gw_max: 1.5
        expected_range: [0, 4]

  high_value:
    description: "The predictions that actually matter for FPL decisions"
    cases:
      - name: captain_candidates
        description: "Players you'd consider captaining — highest stakes prediction"
        filter:
          price_min: 9.0
          form_3gw_min: 4.0
          fixture_difficulty_max: 3
        expected_range: [4, 15]

      - name: differential_picks
        description: "Mid-price players with potential — where good predictions win mini-leagues"
        filter:
          price_min: 5.5
          price_max: 9.0
          ict_index_3gw_min: 20.0
        expected_range: [2, 10]

      - name: budget_enablers
        description: "Cheap players who might return — bench/rotation decisions"
        filter:
          price_max: 5.0
          form_3gw_min: 3.0
        expected_range: [2, 8]
