<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0f1f3d"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ff87"/>
      <stop offset="100%" stop-color="#60efff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle pitch lines pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1050" y1="0" x2="1050" y2="400"/>
  </g>

  <!-- Centre circle (pitch reference) -->
  <circle cx="600" cy="200" r="100" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.03"/>

  <!-- Top glow -->
  <ellipse cx="600" cy="-30" rx="450" ry="200" fill="#00ff87" opacity="0.05"/>
  <!-- Bottom accent glow -->
  <ellipse cx="400" cy="430" rx="350" ry="150" fill="#60efff" opacity="0.04"/>

  <!-- Left side: XGBoost visualization (bar chart) -->
  <g transform="translate(50, 80)" opacity="0.55">
    <rect x="0" y="0" width="180" height="150" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="12" y="22" fill="#ffffff" fill-opacity="0.5" font-family="system-ui, sans-serif" font-size="10" font-weight="600">XGBoost</text>
    <rect x="16" y="38" width="20" height="95" rx="3" fill="#60efff" fill-opacity="0.2"/>
    <rect x="16" y="68" width="20" height="65" rx="3" fill="#60efff" fill-opacity="0.45"/>
    <rect x="44" y="48" width="20" height="85" rx="3" fill="#60efff" fill-opacity="0.2"/>
    <rect x="44" y="73" width="20" height="60" rx="3" fill="#60efff" fill-opacity="0.45"/>
    <rect x="72" y="35" width="20" height="98" rx="3" fill="#60efff" fill-opacity="0.2"/>
    <rect x="72" y="53" width="20" height="80" rx="3" fill="#60efff" fill-opacity="0.45"/>
    <rect x="100" y="58" width="20" height="75" rx="3" fill="#60efff" fill-opacity="0.2"/>
    <rect x="100" y="83" width="20" height="50" rx="3" fill="#60efff" fill-opacity="0.45"/>
    <rect x="128" y="42" width="20" height="91" rx="3" fill="#60efff" fill-opacity="0.2"/>
    <rect x="128" y="63" width="20" height="70" rx="3" fill="#60efff" fill-opacity="0.45"/>
    <line x1="12" y1="133" x2="165" y2="133" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  </g>

  <!-- Left side: feature importance (smaller card) -->
  <g transform="translate(70, 250)" opacity="0.4">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="10" y="18" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9" font-weight="500">Feature Importance</text>
    <rect x="10" y="28" width="110" height="5" rx="2" fill="#60efff" fill-opacity="0.3"/>
    <rect x="10" y="38" width="85" height="5" rx="2" fill="#60efff" fill-opacity="0.25"/>
    <rect x="10" y="48" width="70" height="5" rx="2" fill="#60efff" fill-opacity="0.2"/>
    <rect x="10" y="58" width="55" height="5" rx="2" fill="#60efff" fill-opacity="0.15"/>
    <rect x="10" y="68" width="40" height="5" rx="2" fill="#60efff" fill-opacity="0.1"/>
    <rect x="10" y="78" width="25" height="5" rx="2" fill="#60efff" fill-opacity="0.08"/>
  </g>

  <!-- Right side: LLM visualization (chat prompt) -->
  <g transform="translate(970, 80)" opacity="0.55">
    <rect x="0" y="0" width="180" height="150" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="12" y="22" fill="#ffffff" fill-opacity="0.5" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Fine-Tuned LLM</text>
    <rect x="12" y="36" width="100" height="5" rx="2" fill="#00ff87" fill-opacity="0.25"/>
    <rect x="12" y="48" width="75" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="12" y="60" width="130" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="12" y="72" width="95" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="12" y="84" width="110" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="12" y="96" width="65" height="5" rx="2" fill="#ffffff" fill-opacity="0.1"/>
    <line x1="12" y1="112" x2="165" y2="112" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <rect x="12" y="120" width="42" height="18" rx="4" fill="#00ff87" fill-opacity="0.15" stroke="#00ff87" stroke-opacity="0.25"/>
    <text x="21" y="133" fill="#00ff87" fill-opacity="0.75" font-family="system-ui, sans-serif" font-size="11" font-weight="700">7 pts</text>
  </g>

  <!-- Right side: eval results (smaller card) -->
  <g transform="translate(980, 250)" opacity="0.4">
    <rect x="0" y="0" width="150" height="100" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="10" y="18" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9" font-weight="500">Eval Results</text>
    <text x="10" y="38" fill="#00ff87" fill-opacity="0.5" font-family="system-ui, sans-serif" font-size="9">MAE  2.1</text>
    <text x="10" y="52" fill="#60efff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9">MAE  2.9</text>
    <rect x="10" y="62" width="130" height="1" fill="#ffffff" fill-opacity="0.05"/>
    <text x="10" y="78" fill="#ffffff" fill-opacity="0.3" font-family="system-ui, sans-serif" font-size="8">fixture_context  OK</text>
    <text x="10" y="90" fill="#ffffff" fill-opacity="0.3" font-family="system-ui, sans-serif" font-size="8">positional       OK</text>
  </g>

  <!-- Main title -->
  <text x="600" y="130" fill="#ffffff" font-family="system-ui, sans-serif" font-size="42" font-weight="800" text-anchor="middle" letter-spacing="-1">FPL Points Predictor</text>

  <!-- Subtitle -->
  <text x="600" y="165" fill="url(#accent)" font-family="system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="0.5">Fine-Tuned LLM vs XGBoost on Apple Silicon</text>

  <!-- VS pill -->
  <g transform="translate(555, 185)" filter="url(#glow)">
    <rect x="0" y="0" width="90" height="32" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="45" y="22" fill="#ffffff" fill-opacity="0.6" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">VS</text>
  </g>

  <!-- Connecting dashed lines -->
  <line x1="235" y1="200" x2="555" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="645" y1="200" x2="970" y2="200" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Description -->
  <text x="600" y="245" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Can a locally fine-tuned open-source LLM compete with traditional ML</text>
  <text x="600" y="263" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">at predicting Fantasy Premier League player points?</text>

  <!-- WIP Badge -->
  <g transform="translate(490, 280)">
    <rect x="0" y="0" width="220" height="28" rx="14" fill="#ff6b35" fill-opacity="0.12" stroke="#ff6b35" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="16" cy="14" r="3.5" fill="#ff6b35" opacity="0.85"/>
    <text x="28" y="19" fill="#ffc234" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1.2">WORK IN PROGRESS</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(340, 340)">
    <rect x="0" y="0" width="60" height="22" rx="11" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="30" y="15" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">MLX</text>

    <rect x="70" y="0" width="60" height="22" rx="11" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="100" y="15" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">LoRA</text>

    <rect x="140" y="0" width="78" height="22" rx="11" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="179" y="15" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">Llama 3.2</text>

    <rect x="228" y="0" width="78" height="22" rx="11" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="267" y="15" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">XGBoost</text>

    <rect x="316" y="0" width="70" height="22" rx="11" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="351" y="15" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">Mac M4</text>

    <rect x="396" y="0" width="70" height="22" rx="11" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="431" y="15" fill="#ffffff" fill-opacity="0.4" font-family="system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">FPL API</text>
  </g>
</svg>
